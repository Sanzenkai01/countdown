<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Contador do Beta Teste - 22/05/2026 10:00 ate 24/05/2026 22:00 (Horario de Brasilia)</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <main class="wrap">
      <section class="card" role="region" aria-labelledby="title">
        <div class="brand">Drakantos</div>
        <h1 id="title" class="title">Contador do Beta Teste</h1>
        <p class="subtitle">Acompanhe quanto tempo ja passou e quanto falta entre 22/05/2026 10:00 e 24/05/2026 22:00 (Horario de Brasilia)</p>

        <div class="timers" aria-live="polite">
          <section class="timer-panel" aria-labelledby="elapsed-title">
            <h2 id="elapsed-title" class="timer-title">Tempo decorrido</h2>
            <div class="countdown">
              <div class="time-box">
                <span class="value" id="elapsedHours">00</span>
                <span class="label">horas</span>
              </div>
              <div class="time-box">
                <span class="value" id="elapsedMinutes">00</span>
                <span class="label">min</span>
              </div>
              <div class="time-box">
                <span class="value" id="elapsedSeconds">00</span>
                <span class="label">seg</span>
              </div>
            </div>
          </section>

          <section class="timer-panel" aria-labelledby="remaining-title">
            <h2 id="remaining-title" class="timer-title">Tempo restante</h2>
            <div class="countdown">
              <div class="time-box">
                <span class="value" id="remainingHours">00</span>
                <span class="label">horas</span>
              </div>
              <div class="time-box">
                <span class="value" id="remainingMinutes">00</span>
                <span class="label">min</span>
              </div>
              <div class="time-box">
                <span class="value" id="remainingSeconds">00</span>
                <span class="label">seg</span>
              </div>
            </div>
          </section>
        </div>

        <div id="finalMsg" class="final hidden">60 horas completas.</div>
        <div class="meta">Timezone: <strong>America/Sao_Paulo</strong></div>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
