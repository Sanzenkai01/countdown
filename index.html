<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Contagem Regressiva — 22/05/2026 10:00 (Horário de Brasília)</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <main class="wrap">
      <section class="card" role="region" aria-labelledby="title">
        <div class="brand">Drakantos</div>
        <h1 id="title" class="title">Contagem regressiva</h1>
        <p class="subtitle">Contagem regressiva para o lançamento do beta — 22 de maio de 2026, 10:00 (Horário de Brasília)</p>

        <div id="countdown" class="countdown" aria-live="polite">
          <div class="time-box">
            <span class="value" id="days">0</span>
            <span class="label">dias</span>
          </div>
          <div class="time-box">
            <span class="value" id="hours">00</span>
            <span class="label">horas</span>
          </div>
          <div class="time-box">
            <span class="value" id="minutes">00</span>
            <span class="label">min</span>
          </div>
          <div class="time-box">
            <span class="value" id="seconds">00</span>
            <span class="label">seg</span>
          </div>
        </div>

        <div id="finalMsg" class="final hidden">Chegou!</div>
        <div class="meta">Timezone: <strong>America/Sao_Paulo</strong></div>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
